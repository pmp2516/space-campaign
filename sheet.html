<script type="text/worker">

on("clicked:character_tab", function() {
    setAttrs({
        sheet_tab: "character"
    });
});

on("clicked:ship_tab", function() {
    setAttrs({
        sheet_tab: "ship"
    });
});

</script><script type="text/worker">

/* ======================================================
   ABILITY MODIFIERS
====================================================== */

const abilities = [
    "strength",
    "dexterity",
    "constitution",
    "intelligence",
    "wisdom",
    "charisma"
];

abilities.forEach(function(stat){

    on(`change:${stat}`, function(){

        getAttrs([stat], function(values){

            let score =
                parseInt(values[stat]) || 10;

            let mod =
                Math.floor((score - 10) / 2);

            let update = {};

            update[`${stat}_mod`] = mod;

            setAttrs(update);

        });

    });

});

/* ======================================================
   PROFICIENCY BONUS
====================================================== */

on("change:level sheet:opened", function(){

    getAttrs(["level"], function(v){

        let level =
            parseInt(v.level) || 1;

        let prof = 2;

        if(level >= 5) prof = 3;
        if(level >= 9) prof = 4;
        if(level >= 13) prof = 5;
        if(level >= 17) prof = 6;

        setAttrs({
            proficiency_bonus: prof
        });

    });

});

/* ======================================================
   STATION AUTOMATION
====================================================== */

const stations = [
    "command",
    "engineering",
    "saboteur",
    "pilot",
    "weapons",
    "tactical"
];

stations.forEach(function(station){

    on(
        `change:${station}_ability
         change:${station}_station_mod
         change:${station}_prof
         change:proficiency_bonus
         change:strength_mod
         change:dexterity_mod
         change:constitution_mod
         change:intelligence_mod
         change:wisdom_mod
         change:charisma_mod`,
    function(){

        getAttrs([
            `${station}_ability`,
            `${station}_station_mod`,
            `${station}_prof`,
            "proficiency_bonus",

            "strength_mod",
            "dexterity_mod",
            "constitution_mod",
            "intelligence_mod",
            "wisdom_mod",
            "charisma_mod"

        ], function(v){

            let ability =
                v[`${station}_ability`];

            let stationMod =
                parseInt(
                    v[`${station}_station_mod`]
                ) || 0;

            let prof =
                parseInt(
                    v.proficiency_bonus
                ) || 0;

            let proficient =
                v[`${station}_prof`] === "on";

            let abilityMod =
                parseInt(
                    v[`${ability}_mod`]
                ) || 0;

            let total =
                stationMod +
                abilityMod +
                (proficient ? prof : 0);

            let update = {};

            update[
                `${station}_total_mod`
            ] = total;

            setAttrs(update);

        });

    });

});

</script>
